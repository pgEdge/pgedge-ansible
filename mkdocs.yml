site_name: pgEdge Ansible Collection

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

copyright: Copyright &copy; 2025 - 2026 pgEdge, Inc
repo_url: https://github.com/pgEdge/pgedge-ansible

nav:
  - Getting Started:
      - Overview: index.md
      - Installation: installation.md
  - Deploying a Cluster:
      - Simple Cluster: simple_cluster.md
      - Ultra-HA Cluster: ultra_ha.md
  - Configuration Reference: configuration.md
  - Role Reference: roles.md
  - Changelog: changelog.md
  - License: LICENSE.md
